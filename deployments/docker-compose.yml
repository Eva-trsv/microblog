services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: microblog_api
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "6060:6060"
    environment:
      DATABASE_URL: postgres://postgres:secret321@db:5432/microblog_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_USER_REGISTERED: user_registered
      KAFKA_TOPIC_POST_CREATED: post_created
      KAFKA_TOPIC_POST_LIKED: post_liked
      KAFKA_WRITE_TIMEOUT_SECONDS: 5
      KAFKA_RETRIES: 3
    depends_on:
      - db
      - kafka

  engagement:
    build:
      context: ..
      dockerfile: Dockerfile.engagement
    container_name: microblog_engagement
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://postgres:secret321@db:5432/microblog_db?sslmode=disable
      ENGAGEMENT_PORT: :8081
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: engagement
      KAFKA_TOPIC_USER_REGISTERED: user_registered
      KAFKA_TOPIC_POST_CREATED: post_created
      KAFKA_TOPIC_POST_LIKED: post_liked
      SHUTDOWN_TIMEOUT_SECONDS: 10
    depends_on:
      - db
      - kafka

  db:
    image: postgres:16
    container_name: pg
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: secret321
      POSTGRES_DB: microblog_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: kafka
    restart: unless-stopped
    environment:
      KAFKA_ENABLE_KRAFT: yes
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://188.120.229.55:19092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: true
      ALLOW_PLAINTEXT_LISTENER: yes
    ports:
      - "19092:19092"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

volumes:
  pgdata:
